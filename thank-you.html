  <style>
    :root {
      --bg: #080808; --gold: #c9a96e; --gold-light: #e8d5b0;
      --white: #f5f2ec; --muted: #6a6a62; --border: #222222;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--white);
      font-family: 'Jost', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; text-align: center; padding: 40px 24px;
    }
    .container { max-width: 520px; }
    .gold-line { width: 1px; height: 48px; background: var(--gold); margin: 0 auto 28px; }
    .tag {
      font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 18px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif; font-size: 42px;
      font-weight: 300; line-height: 1.2; color: var(--white); margin-bottom: 18px;
    }
    h1 em { font-style: italic; color: var(--gold-light); }
    p { font-size: 14px; color: var(--muted); line-height: 1.85; margin-bottom: 12px; }
    .divider { width: 40px; height: 1px; background: var(--border); margin: 28px auto; }
    .redirect-note { font-size: 11px; color: var(--muted); opacity: 0.5; }
    .btn {
      display: inline-block; margin-top: 24px;
      background: transparent; border: 1px solid var(--gold);
      color: var(--gold); padding: 14px 40px;
      font-family: 'Jost', sans-serif; font-size: 10px;
      font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase;
      text-decoration: none; transition: all 0.3s;
    }
    .btn:hover { background: var(--gold); color: #080808; }
  </style>
</head>
